name        = "inspect_rds_metrics"
description = "Inspects both RDS instances (ctl-api and Temporal): instance config, Performance Insights OS metrics, and AAS breakdown by wait event, query, and lock."
readme      = "./runbooks/inspect_rds_metrics.md"
labels      = { service = "rds", type = "debug" }

[[steps]]
name        = "Inspect ctl-api RDS"
type        = "action"
action_name = "rds_inspect_ctl_api"

[[steps]]
name        = "ctl-api AAS breakdown (waits / queries / locks)"
type        = "action"
action_name = "rds_aas_ctl_api"

[[steps]]
name        = "Inspect Temporal RDS"
type        = "action"
action_name = "rds_inspect_temporal"

[[steps]]
name        = "Temporal AAS breakdown (waits / queries / locks)"
type        = "action"
action_name = "rds_aas_temporal"
