name        = "temporal_hard_reset"
description = "Temporal hard-reset SoP: drop and recreate the Temporal DB, restore namespaces, and clear out stale runner/workflow state."
readme      = "./runbooks/temporal_hard_reset.md"

[[steps]]
name        = "Scale ctl-api worker deployments down"
type        = "action"
action_name = "temporal_hard_reset_scale_down_ctl_api_workers"

[[steps]]
name        = "Scale temporal deployments down"
type        = "action"
action_name = "temporal_hard_reset_scale_down_temporal"

[[steps]]
name        = "Drop Temporal DB"
type        = "action"
action_name = "temporal_hard_reset_drop_db"

[[steps]]
name        = "Recreate Temporal DB"
type        = "action"
action_name = "temporal_hard_reset_init_db"

[[steps]]
name        = "Scale up Temporal namespace pods"
type        = "action"
action_name = "temporal_hard_reset_scale_up_temporal"

[[steps]]
name        = "Ensure Temporal namespaces"
type        = "action"
action_name = "temporal_hard_reset_ensure_namespaces"

[[steps]]
name        = "Scale ctl-api worker deployments up"
type        = "action"
action_name = "temporal_hard_reset_scale_up_ctl_api_workers"

[[steps]]
name        = "Restart org queues"
type        = "action"
action_name = "temporal_hard_reset_restart_org_queues"

[[steps]]
name        = "Reprovision orgs"
type        = "action"
action_name = "temporal_hard_reset_reprovision_orgs"

[[steps]]
name        = "Restart runner processes"
type        = "action"
action_name = "temporal_hard_reset_restart_runner_processes"

[[steps]]
name        = "Cancel queued workflows"
type        = "action"
action_name = "temporal_hard_reset_cancel_queued_workflows"

[[steps]]
name        = "Cancel shutdown runner jobs"
type        = "action"
action_name = "temporal_hard_reset_cancel_shutdown_runner_jobs"

[[steps]]
name        = "Temporal healthcheck"
type        = "action"
action_name = "healthcheck_temporal"

[[steps]]
name        = "Check runner status"
type        = "action"
action_name = "status_report"
