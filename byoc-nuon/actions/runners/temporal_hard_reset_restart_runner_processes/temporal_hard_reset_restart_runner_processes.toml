#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: temporal hard-reset step 7 — force-shuts-down all active runner processes
# via /v1/runners/shutdown-processes. Runner deployments respawn fresh processes and
# re-register via POST /v1/runners/{id}/processes.
name    = "temporal_hard_reset_restart_runner_processes"
labels  = { service = "runners", type = "step" }
timeout = "2m"

[[triggers]]
type = "manual"

[[steps]]
name = "shutdown_all_runner_processes"
inline_contents = "./runners/temporal_hard_reset_restart_runner_processes/shutdown_all_runner_processes.sh"

[steps.env_vars]
ADMIN_API_URL = "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
