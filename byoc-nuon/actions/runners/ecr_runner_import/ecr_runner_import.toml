#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# Imports runner image tags from an upstream ECR public registry into the
# install's own public ECR runner repository (component: runner_repository),
# so runners can pull from the install's repo directly.
name    = "ecr_runner_import"
labels  = { service = "runners", type = "sop" }
timeout = "10m"

# Note: this action also runs as a step in ctl_api_post_deploy.toml so the
# install's public ECR runner repo is populated immediately after ctl_api
# deploys. This standalone definition exists for manual re-runs.
[[triggers]]
type = "manual"

[[steps]]
name            = "import"
inline_contents = "./runners/ecr_runner_import/import.sh"

[steps.env_vars]
# SOURCE_IMAGE_URL      = "{{ .nuon.inputs.inputs.runner_image_url }}" # hardcoded to public ecr repo in action
RUNNER_REPOSITORY_URI = "{{ .nuon.components.runner_repository.outputs.runner_repository.repository_uri }}"
OVERRIDE              = "false"
