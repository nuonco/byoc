# action
# description: inspects the ctl-api (nuon) RDS instance — prints instance config and
# Performance Insights OS metrics (CPU / memory / IOPS) for the last hour in table format.
name    = "rds_inspect_ctl_api"
labels  = { service = "rds", purpose = "debug" }
label   = "aws"
timeout = "2m"
role    = "{{.nuon.install.id}}-provision"

[[triggers]]
type = "manual"

[[steps]]
name            = "Inspect ctl-api RDS"
inline_contents = "./aws/rds_inspect/rds_inspect.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_resource_id }}"
DB_LABEL       = "ctl-api (nuon)"
