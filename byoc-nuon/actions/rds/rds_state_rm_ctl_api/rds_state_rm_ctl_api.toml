# action
# description: removes the ctl-api (nuon) RDS instance from its Terraform
# component state (without destroying it) so the remaining resources can tear
# down without tripping the block-destructive-changes policy. Run after the
# instance has been backed up and deleted via the AWS API.
name    = "rds_state_rm_ctl_api"
labels  = { service = "rds", type = "sop" }
label   = "aws"
timeout = "15m"
role    = "{{.nuon.install.id}}-rds-operations"

[[triggers]]
type = "manual"

[[steps]]
name            = "Detach ctl-api RDS from state"
inline_contents = "./tf/state_rm/state_rm.sh"

[steps.env_vars]
INSTALL_COMPONENT_ID = "{{ .nuon.components.rds_cluster_nuon.install_component_id }}"
STATE_ADDRESSES      = "module.db.module.db_instance.aws_db_instance.this[0]"
TF_VERSION           = "1.11.3"
DB_LABEL             = "ctl-api (nuon)"
