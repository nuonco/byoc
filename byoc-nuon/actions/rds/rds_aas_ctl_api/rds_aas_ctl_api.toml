#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: breaks down ctl-api (nuon) RDS Average Active Sessions (AAS) over the
# last hour by wait event, by query, and by lock wait — using Performance Insights.
name    = "rds_aas_ctl_api"
labels  = { service = "rds", type = "sop" }
label   = "aws"
timeout = "2m"
role    = "{{.nuon.install.id}}-provision"

[[triggers]]
type = "manual"

[[steps]]
name            = "AAS by waits"
inline_contents = "./rds/rds_aas/aas_breakdown.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_resource_id }}"
DB_LABEL       = "ctl-api (nuon)"
MODE           = "waits"

[[steps]]
name            = "AAS by queries"
inline_contents = "./rds/rds_aas/aas_breakdown.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_resource_id }}"
DB_LABEL       = "ctl-api (nuon)"
MODE           = "queries"

[[steps]]
name            = "AAS by locks"
inline_contents = "./rds/rds_aas/aas_breakdown.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_resource_id }}"
DB_LABEL       = "ctl-api (nuon)"
MODE           = "locks"
