#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: deletes the Temporal RDS instance via the AWS API, taking a final
# snapshot as part of the deletion. Explicit destruction step of the Temporal
# RDS teardown — deliberately decoupled from the Terraform teardown job.
name    = "rds_delete_temporal"
labels  = { service = "rds", type = "sop" }
label   = "aws"
timeout = "30m"
role    = "{{.nuon.install.id}}-rds-operations"

[[triggers]]
type = "manual"

[[steps]]
name            = "Delete Temporal RDS"
inline_contents = "./rds/rds_delete/rds_delete.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_temporal.outputs.db_instance_resource_id }}"
DB_LABEL       = "temporal"
