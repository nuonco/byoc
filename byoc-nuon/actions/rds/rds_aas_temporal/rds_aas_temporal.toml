# action
# description: breaks down Temporal RDS Average Active Sessions (AAS) over the last
# hour by wait event, by query, and by lock wait — using Performance Insights.
name    = "rds_aas_temporal"
labels  = { service = "rds", type = "sop" }
label   = "aws"
timeout = "2m"
role    = "{{.nuon.install.id}}-provision"

[[triggers]]
type = "manual"

[[steps]]
name            = "AAS by waits"
inline_contents = "./rds/rds_aas/aas_breakdown.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_temporal.outputs.db_instance_resource_id }}"
DB_LABEL       = "temporal"
MODE           = "waits"

[[steps]]
name            = "AAS by queries"
inline_contents = "./rds/rds_aas/aas_breakdown.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_temporal.outputs.db_instance_resource_id }}"
DB_LABEL       = "temporal"
MODE           = "queries"

[[steps]]
name            = "AAS by locks"
inline_contents = "./rds/rds_aas/aas_breakdown.sh"

[steps.env_vars]
DB_RESOURCE_ID = "{{ .nuon.components.rds_cluster_temporal.outputs.db_instance_resource_id }}"
DB_LABEL       = "temporal"
MODE           = "locks"
