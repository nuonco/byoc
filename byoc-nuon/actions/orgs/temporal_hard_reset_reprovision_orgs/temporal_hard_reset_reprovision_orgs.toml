# action
# description: temporal hard-reset step 6 — reprovisions every org via admin API.
name    = "temporal_hard_reset_reprovision_orgs"
labels  = { layer = "app", purpose = "step" }
timeout = "5m"

[[triggers]]
type = "manual"

[[steps]]
name = "reprovision_orgs"
inline_contents = "./orgs/temporal_hard_reset_reprovision_orgs/reprovision_orgs.sh"

[steps.env_vars]
ADMIN_API_URL = "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
