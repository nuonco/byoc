#:schema https://api.nuon.co/v1/general/config-schema?source=action
name    = "runner_deployments"
timeout = "2m"

[[triggers]]
type = "manual"

[[steps]]
name = "runner_deployments"
inline_contents = """
#!/usr/bin/env sh

set -e
set -o pipefail
set -u


admin_api_url="$ADMIN_API_URL"

echo "get org runners"
runners=`curl -s "$admin_api_url/v1/runners?type=org&limit=100" | jq -c`

for runner_id in `echo $runners | jq -r '.[].id'`; do
  echo " > getting deployment for runner id:$runner_id"
  kubectl --namespace $runner_id get deployments/runner-$runner_id -o wide
done
"""

[steps.env_vars]
ADMIN_API_URL = "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}:8082"
