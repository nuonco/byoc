#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: per-deployment resource requests/limits, current top usage per pod,
# and any OOMKilled containers in a namespace. Output is json.
# Set NAMESPACE to target a namespace (default ctl-api).
name    = "kubectl_deployment_resources"
labels  = { service = "kubernetes", type = "debug" }
timeout = "1m"

[[triggers]]
type = "manual"

[[steps]]
name            = "exec"
inline_contents = "./kubectl/kubectl_deployment_resources/deployment-resources.sh"

[steps.env_vars]
NAMESPACE = "ctl-api"
