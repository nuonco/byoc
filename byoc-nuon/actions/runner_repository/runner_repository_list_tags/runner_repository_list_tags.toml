# action
# description: lists image tags in the public ECR `runner` repository
# provisioned by the `runner_repository` component
# (components/0-tf-runner-repository.toml).
name    = "runner_repository_list_tags"
label   = "aws"
timeout = "30s"

[[triggers]]
type = "manual"

[[steps]]
name            = "list"
inline_contents = "./runner_repository/runner_repository_list_tags/list-tags.sh"

[steps.env_vars]
REPOSITORY_NAME = "runner"
LIMIT           = "20"
AWS_REGION      = "us-east-1"
