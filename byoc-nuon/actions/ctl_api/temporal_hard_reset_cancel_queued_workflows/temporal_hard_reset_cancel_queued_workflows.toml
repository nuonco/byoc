# action
# description: temporal hard-reset step 9 — cancels all install_workflows rows whose
# composite status is "queued" by updating status->>'status' to "cancelled".
name    = "temporal_hard_reset_cancel_queued_workflows"
labels  = { service = "ctl-api", type = "step" }
timeout = "5m"

[[triggers]]
type = "manual"

[[steps]]
name            = "Cancel queued workflows"
inline_contents = "./ctl_api/temporal_hard_reset_cancel_queued_workflows/cancel-queued-workflows.sh"

[steps.env_vars]
DB_USER    = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_username }}"
DB_NAME    = "ctl_api"
SECRET_ARN = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_master_user_secret_arn }}"
DB_ADDR    = "{{ .nuon.components.rds_cluster_nuon.outputs.address }}"
DB_PORT    = "5432"
REGION     = "{{ .nuon.install_stack.outputs.region }}"
