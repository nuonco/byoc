#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: cancels all in-flight queue_signals in the ctl_api DB (clears org queues). Write action — runs read-write, unlike ctl_api_query_db. Intended to run while Temporal server + ctl-api workers are scaled down.
name    = "ctl_api_clear_org_queues"
timeout = "1m"

[[triggers]]
type = "manual"

[[steps]]
name            = "Clear org queue signals"
inline_contents = "./ctl_api/ctl_api_clear_org_queues/clear-org-queues.sh"

[steps.env_vars]
DB_USER    = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_username }}"
DB_NAME    = "ctl_api"
SECRET_ARN = "{{ .nuon.components.rds_cluster_nuon.outputs.db_instance_master_user_secret_arn }}"
DB_ADDR    = "{{ .nuon.components.rds_cluster_nuon.outputs.address }}"
DB_PORT    = "5432"
REGION     = "{{ .nuon.install_stack.outputs.region }}"
CANCELLED_BY = "clear-org-queues-0606"
