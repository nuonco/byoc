#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: scales all ctl-api worker deployments to zero replicas.
# Set SCALE_TARGET to control replicas (0 to scale down, or a number to scale back up).
name    = "workers-scale-down"
labels  = { service = "ctl-api", type = "sop" }
timeout = "1m"

[[triggers]]
type = "manual"

[[steps]]
name = "scale workers"
inline_contents = "./ctl_api/ctl_api_scale_to_zero/scale_workers.sh"

[steps.env_vars]
SCALE_TARGET = "0"
