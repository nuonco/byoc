# action
name    = "inspect_app"
labels  = { service = "ctl-api", purpose = "debug" }
timeout = "5m"

[[triggers]]
type = "manual"

[[steps]]
name = "timestamp"
inline_contents = '''
#!/usr/bin/env bash
set -euo pipefail
jq -nc --arg ts "$(TZ=UTC date +%Y-%m-%dT%H:%M:%SZ)" '{updated_at: $ts}' >> $NUON_ACTIONS_OUTPUT_FILEPATH
'''

[[steps]]
name = "app"
inline_contents = '''
#!/usr/bin/env bash

set -e
set -o pipefail
set -u

echo "inspect_app step starting"
admin_api_addr="$ADMIN_API_URL"
app_id="${APP_ID:-}"
echo "admin_api_addr=$admin_api_addr app_id=$app_id"

if [[ -z "$app_id" ]]; then
  echo "APP_ID is required"
  exit 1
fi

limit=25
offset=0
found=""

while :; do
  url="$admin_api_addr/v1/apps/details?limit=$limit&offset=$offset"
  body_file=$(mktemp)
  http_code=$(curl --max-time 30 -q -s -o "$body_file" -w '%{http_code}' \
    "$url" \
    -H 'accept: application/json' \
    -H 'X-Nuon-Admin-Email: jon@nuon.co')
  page=$(cat "$body_file")
  rm -f "$body_file"

  echo "GET $url -> $http_code"
  if [ "$http_code" != "200" ]; then
    echo "non-200 response: $page"
    exit 1
  fi

  if ! echo "$page" | jq -e 'type == "array"' >/dev/null; then
    echo "expected JSON array, got: $page"
    exit 1
  fi

  count=$(echo "$page" | jq 'length')
  echo "page returned $count app(s)"
  if [ "$count" -eq 0 ]; then
    break
  fi

  match=$(echo "$page" | jq -c --arg id "$app_id" '.[] | select(.id == $id)')
  if [[ -n "$match" ]]; then
    found="$match"
    break
  fi

  if [ "$count" -lt "$limit" ]; then
    break
  fi

  offset=$((offset + limit))
done

if [[ -z "$found" ]]; then
  echo "app $app_id not found"
  exit 1
fi

echo "$found" | jq -c '.' >> "$NUON_ACTIONS_OUTPUT_FILEPATH"
'''

[steps.env_vars]
ADMIN_API_URL = "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
APP_ID        = ""
