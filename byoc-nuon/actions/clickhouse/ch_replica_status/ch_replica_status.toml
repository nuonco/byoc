# action
# description: periodically checks ClickHouse replicas and restores any that are read-only.
name    = "ch_cluster_replicas"
timeout = "5m"

[[triggers]]
type  = "manual"

[[triggers]]
type          = "cron"
cron_schedule = "10,20,30,40,50 * * * *"

[[steps]]
name            = "check_and_restore_replicas"
inline_contents = "./clickhouse/ch_replica_status/check_and_restore_replicas.sh"

[steps.env_vars]
RESTART = "false"
