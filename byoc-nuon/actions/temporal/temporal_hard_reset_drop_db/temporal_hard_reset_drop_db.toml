# action
# description: temporal hard-reset step 1 — drops the Temporal DB via temporal-sql-tool.
name    = "temporal_hard_reset_drop_db"
labels  = { service = "temporal", purpose = "step" }
timeout = "1m30s"

[[triggers]]
type = "manual"

[[steps]]
name            = "Drop Temporal DB"
inline_contents = "./temporal/temporal_hard_reset_drop_db/drop-db.sh"
