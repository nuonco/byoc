# action
# description: lists the N most recent Temporal workflows in a namespace,
# showing workflow id, type, status, and start/close times.
name    = "temporal_workflow_list_latest"
label   = "temporal"
timeout = "5m"

[[triggers]]
type = "manual"

[[steps]]
name            = "list latest workflows"
inline_contents = "./temporal/temporal_workflow_list_latest/list_latest_workflows.sh"

[steps.env_vars]
NAMESPACE = "general"
LIMIT     = "10"
