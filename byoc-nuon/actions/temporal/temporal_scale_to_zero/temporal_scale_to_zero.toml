# action
# description: scales all Temporal server deployments to zero replicas.
# Set SCALE_TARGET to control replicas (0 to scale down, or a number to scale back up).
name    = "temporal-scale-down"
labels  = { layer = "services", purpose = "sop" }
label   = "kubectl"
timeout = "1m"

[[triggers]]
type = "manual"

[[steps]]
name = "scale temporal"
inline_contents = "./temporal/temporal_scale_to_zero/scale_temporal.sh"

[steps.env_vars]
SCALE_TARGET = "0"
