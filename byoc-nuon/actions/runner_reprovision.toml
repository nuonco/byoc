#:schema https://api.nuon.co/v1/general/config-schema?source=action
name    = "org_runners_reprovision"
timeout = "2m"

[[triggers]]
type = "manual"

[[steps]]
name = "org_runners_reprovision"
inline_contents = """
#!/usr/bin/env sh

set -e
set -o pipefail
set -u

echo "[reprovision] get org runners"
runners=`curl -s "$admin_api_url/v1/runners?type=org&limit=100" | jq -c`

for runner_id in `echo $runners | jq -r '.[].id'`; do
  echo " > reprovisioning: runner id:$runner_id"
  curl -s -X 'POST' \
    "$admin_api_url/v1/runners/$runner_id/reprovision" \
    -H 'accept: application/json' \
    -H 'Content-Type: application/json' \
    -d '{}'
done
"""

[steps.env_vars]
ADMIN_API_URL = "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
