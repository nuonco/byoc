# action
# description: temporal hard-reset step 2 — recreates the Temporal DB and DB users.
name    = "temporal_hard_reset_init_db"
timeout = "1m30s"

[[triggers]]
type = "manual"

[[steps]]
name            = "Initialize the DB"
inline_contents = "./src/temporal/init-db.sh"

[steps.env_vars]
REGION = "{{ .nuon.install_stack.outputs.region }}"

[[steps]]
name            = "Create DB Users"
inline_contents = "./src/temporal/create-db-users.sh"

[steps.env_vars]
REGION = "{{ .nuon.install_stack.outputs.region }}"
