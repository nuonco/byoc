# action
# description: temporal hard-reset step 7 — force-shuts-down all active runner processes
# via /v1/runners/shutdown-processes. Runner deployments respawn fresh processes and
# re-register via POST /v1/runners/{id}/processes.
name    = "temporal_hard_reset_restart_runner_processes"
timeout = "2m"

[[triggers]]
type = "manual"

[[steps]]
name = "shutdown_all_runner_processes"
inline_contents = """
#!/usr/bin/env bash

set -e
set -o pipefail
set -u

admin_api_url="$ADMIN_API_URL"

echo "[restart-runner-processes] forcing shutdown of all runner processes"
curl -s -X 'POST' \
  "$admin_api_url/v1/runners/shutdown-processes" \
  -H 'accept: application/json' \
  -H 'X-Nuon-Admin-Email: jon@nuon.co' \
  -H 'Content-Type: application/json' \
  -d '{"shutdown_type": "force"}'

echo
echo "[restart-runner-processes] done; runner deployments should respawn processes"
"""

[steps.env_vars]
ADMIN_API_URL = "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
