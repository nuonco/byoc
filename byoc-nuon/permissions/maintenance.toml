#:schema https://api.nuon.co/v1/general/config-schema?type=permission
type = "maintenance"
name                 = "{{ .nuon.install.id }}-maintenance"
description          = "Maintenance Role for BYOC Nuon"
display_name         = "maintenance"
permissions_boundary = "./boundaries/maintenance_boundary.json"

# Base identity policy: least-privilege action set for the maintenance role, derived from observed
# CloudTrail usage (Telluride steady-state + foreign-forensics component-creation fallback), capped
# by the shared permissions boundary. Replaces AdministratorAccess. Still includes component-create
# verbs (s3/rds/route53/acm) for the interrupted-provision fallback path; these can be dropped to a
# day-2-only set once provision reliably creates all components. The scoped policies below add the
# secretsmanager writes (rds! secrets) and bucket-policy grants on top of this.
[[policies]]
name = "{{ .nuon.install.id }}-maintenance-base"
contents = "./policies/maintenance-base.json"

# NOTE: the tag in this policy is determined by the rds_cluster_* component config. the format is known ahead of time by
# convention.
[[policies]]
name = "{{ .nuon.install.id }}-limited-secrets-manager-rds"
contents = "./policies/rds-secret.json"

[[policies]]
name = "{{ .nuon.install.id }}-allow-secret-list"
contents = "./policies/secrets-list.json"

[[policies]]
name = "bucket-put-policy-scoped"
contents = "./policies/bucket-put-policy.json"
