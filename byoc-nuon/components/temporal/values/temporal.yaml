---
fullnameOverride: temporal

cassandra:
  enabled: false
elasticsearch:
  enabled: false
grafana:
  enabled: false
mysql:
  enabled: false
postgresql:
  enabled: true
prometheus:
  enabled: false

schema:
  setup:
    enabled: false
  update:
    enabled: false

server:
  replicaCount: 5
  dynamicConfig:
    limit.historySize.error:
      - value: 209715200
    limit.blobSize.error:
      - value: 5242880
      
    matching.numTaskqueueWritePartitions:
      - value: 6
        constraints:
          namespace: "runners"
    matching.numTaskqueueReadPartitions:
      - value: 6
        constraints:
          namespace: "runners"
   
    frontend.namespaceRPS:
      - value: 15000
        constraints: {}
    frontend.maxNamespaceRPSPerInstance:
      - value: 5000
        constraints: {}
    
    matching.rps:
      - value: 15000
        constraints: {}
    matching.persistenceMaxQPS:
      - value: 5000
        constraints: {}
    matching.persistenceNamespaceMaxQPS:
      - value: 5000
        constraints: {}
    matching.persistenceMaxQPSPerInstance:
      - value: 10000
        constraints: {}
    
    history.persistenceMaxQPS:
      - value: 10000
        constraints: {}
    history.rps:
      - value: 40000
        constraints: {}
    history.namespaceRPS:
      - value: 40000
        constraints: {}
    history.maxNamespaceRPSPerInstance:
      - value: 20000
        constraints: {}
  config:
    prometheus:
      framework: opentelemetry
      listenAddress: "0.0.0.0:9090"
    persistence:
      default:
        driver: sql
        sql:
          database: temporal
          driver: postgres12
          maxConnLifetime: 1h
          maxConns: 40
          maxIdleConns: 20
          maxQPS: 10000
      visibility:
        driver: sql
        sql:
          database: temporal_visibility
          driver: postgres12
          maxConnLifetime: 1h
          maxConns: 40
          maxIdleConns: 20
          maxQPS: 10000
