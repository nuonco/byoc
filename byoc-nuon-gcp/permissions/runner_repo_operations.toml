#:schema https://api.nuon.co/v1/general/config-schema?type=permission
type           = "custom"
name           = "{{ .nuon.install.id }}-runner-repo-operations"
description    = "Runner Repository Operations - For managing images and tags."
display_name   = "runner-repo-operations"
cloud_platform = "gcp"

# Custom operational role scoped to emptying this install's runner Artifact Registry repository:
# delete images via their packages/versions/tags. Cannot delete the repository itself
# (artifactregistry.repositories.delete is deliberately not granted, mirroring the AWS boundary
# Deny on DeleteRepository).
[[policies]]
name            = "{{ .nuon.install.id }}-runner-repo-operations"
gcp_permissions = [
  "artifactregistry.repositories.get",
  "artifactregistry.repositories.list",
  "artifactregistry.packages.list",
  "artifactregistry.packages.delete",
  "artifactregistry.versions.list",
  "artifactregistry.versions.delete",
  "artifactregistry.tags.list",
  "artifactregistry.tags.delete",
]
