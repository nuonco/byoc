#:schema https://api.nuon.co/v1/general/config-schema?type=permission
type           = "custom"
name           = "dashboard_ui"
description    = "Workload identity for the BYOC dashboard UI"
display_name   = "dashboard-ui"
cloud_platform = "gcp"

[[policies]]
name            = "dashboard-ui-storage-read"
gcp_permissions = [
  "storage.buckets.get",
  "storage.buckets.list",
  "storage.objects.get",
  "storage.objects.list",
]
