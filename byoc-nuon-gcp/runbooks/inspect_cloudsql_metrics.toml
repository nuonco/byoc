#:schema https://api.nuon.co/v1/general/config-schema?type=runbook
name        = "inspect_cloudsql_metrics"
description = "Inspects both Cloud SQL instances (ctl-api and Temporal): instance config and the most recent operations against each instance, in table format."
readme      = "./runbooks/inspect_cloudsql_metrics.md"
labels      = { service = "cloudsql", type = "debug" }

[[steps]]
name        = "Inspect ctl-api Cloud SQL"
type        = "action"
action_name = "cloudsql_inspect_ctl_api"

[[steps]]
name        = "Inspect Temporal Cloud SQL"
type        = "action"
action_name = "cloudsql_inspect_temporal"
