#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: Fetches the Slack client/signing secrets from the central AWS
# Secrets Manager entry referenced by SLACK_SECRETS_ARN — federating this GCP
# install's identity into AWS via web identity (SLACK_SECRETS_ROLE_ARN) — and
# writes them into the install's ctl-api namespace, then restarts api-slack so
# it picks up the new values. Skips cleanly when SLACK_SECRETS_ARN is empty.
name    = "sync_slack_secrets"
labels  = { service = "slack", type = "sop" }
timeout = "2m"

[[triggers]]
type = "manual"

[[steps]]
name            = "sync"
inline_contents = "./slack/sync_slack_secrets/sync-slack-secrets.sh"

[steps.env_vars]
SLACK_SECRETS_ARN      = "{{ or .nuon.inputs.inputs.slack_secrets_arn \"\" }}"
SLACK_SECRETS_ROLE_ARN = "{{ or .nuon.inputs.inputs.secrets_role_arn \"\" }}"
SLACK_SECRETS_AUDIENCE = "sts.amazonaws.com"
NAMESPACE              = "ctl-api"
INSTALL_ID             = "{{ .nuon.install.id }}"
