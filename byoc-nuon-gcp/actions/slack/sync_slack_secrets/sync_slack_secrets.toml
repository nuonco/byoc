# action
# description: Fetches the Slack client/signing secrets from the central
# GCP Secret Manager entry referenced by SLACK_SECRETS_NAME and writes them
# into the install's ctl-api namespace, then restarts api-slack so it picks
# up the new values. Skips cleanly when SLACK_SECRETS_NAME is empty.
name    = "sync_slack_secrets"
labels  = { service = "slack", type = "sop" }
label   = "slack"
timeout = "2m"

[[triggers]]
type = "manual"

[[steps]]
name            = "sync"
inline_contents = "./slack/sync_slack_secrets/sync-slack-secrets.sh"

[steps.env_vars]
SLACK_SECRETS_NAME = "{{ or .nuon.inputs.inputs.slack_secrets_name \"\" }}"
NAMESPACE          = "ctl-api"
