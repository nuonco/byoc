#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: ctl-api (nuon) Cloud SQL load breakdown via Query Insights (analog of rds_aas).
name    = "cloudsql_aas_ctl_api"
labels  = { service = "cloudsql", type = "sop" }
timeout = "2m"
role    = "{{.nuon.install.id}}-observability"

[[triggers]]
type = "manual"

[[steps]]
name            = "Query Insights load breakdown"
inline_contents = "./gcp/cloudsql_aas/aas_breakdown.sh"

[steps.env_vars]
DB_INSTANCE_NAME = "{{ .nuon.components.cloudsql_nuon.outputs.db_instance_name }}"
PROJECT_ID       = "{{ .nuon.install_stack.outputs.project_id }}"
DB_LABEL         = "ctl-api (nuon)"
