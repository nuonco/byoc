#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: inspects the ctl-api (nuon) Cloud SQL instance — prints instance config,
# recent operations, and Cloud Monitoring OS metrics (CPU / memory / IOPS) for the last hour.
name    = "cloudsql_inspect_ctl_api"
labels  = { service = "cloudsql", type = "debug" }
label   = "gcp"
timeout = "2m"
role    = "{{.nuon.install.id}}-observability"

[[triggers]]
type = "manual"

[[steps]]
name            = "Inspect ctl-api Cloud SQL"
inline_contents = "./gcp/cloudsql_inspect/cloudsql_inspect.sh"

[steps.env_vars]
DB_INSTANCE_NAME = "{{ .nuon.components.cloudsql_nuon.outputs.db_instance_name }}"
PROJECT_ID       = "{{ .nuon.install_stack.outputs.project_id }}"
DB_LABEL         = "ctl-api (nuon)"
