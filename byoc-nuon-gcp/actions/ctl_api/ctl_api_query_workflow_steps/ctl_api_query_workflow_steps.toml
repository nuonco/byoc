# action
name    = "ctl_api_query_workflow_steps"
labels  = { service = "ctl-api", type = "tool" }
timeout = "5m"

[[triggers]]
type = "manual"

[[steps]]
name            = "Query workflow steps"
inline_contents = "./ctl_api/ctl_api_query_workflow_steps/query-workflow-steps.sh"

[steps.env_vars]
DB_USER          = "{{ .nuon.components.ctl_api_wi.outputs.db_user }}"
CTL_API_SA_EMAIL = "{{ .nuon.components.ctl_api_wi.outputs.service_account_email }}"
DB_NAME = "ctl_api"
DB_ADDR = "{{ .nuon.components.cloudsql_nuon.outputs.address }}"
DB_PORT = "5432"
LIMIT   = "1"

[[steps]]
name            = "timestamp"
inline_contents = "./ctl_api/ctl_api_query_workflow_steps/timestamp.sh"
