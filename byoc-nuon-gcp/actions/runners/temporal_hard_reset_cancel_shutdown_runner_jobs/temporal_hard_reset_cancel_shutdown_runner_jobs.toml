#:schema https://api.nuon.co/v1/general/config-schema?type=action
# action
# description: temporal hard-reset step 10 — cancels still-active runner_jobs rows
# whose type is shut-down / mng-shut-down / mng-vm-shut-down.
name    = "temporal_hard_reset_cancel_shutdown_runner_jobs"
labels  = { service = "runners", type = "step" }
timeout = "5m"

[[triggers]]
type = "manual"

[[steps]]
name            = "Cancel shutdown runner jobs"
inline_contents = "./runners/temporal_hard_reset_cancel_shutdown_runner_jobs/cancel-shutdown-runner-jobs.sh"

[steps.env_vars]
DB_USER          = "{{ .nuon.components.ctl_api_wi.outputs.db_user }}"
CTL_API_SA_EMAIL = "{{ .nuon.components.ctl_api_wi.outputs.service_account_email }}"
DB_NAME = "ctl_api"
DB_ADDR = "{{ .nuon.components.cloudsql_nuon.outputs.address }}"
DB_PORT = "5432"
