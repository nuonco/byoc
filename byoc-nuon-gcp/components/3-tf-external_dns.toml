#:schema https://api.nuon.co/v1/general/config-schema?type=terraform
name              = "external_dns"
type              = "terraform_module"
terraform_version = "1.11.3"

[public_repo]
repo      = "nuonco/byoc"
directory = "byoc-nuon-gcp/src/components/external_dns"
branch    = "main"

[vars]
install_id              = "{{ .nuon.install.id }}"
project_id              = "{{ .nuon.install_stack.outputs.project_id }}"
region                  = "{{ .nuon.install_stack.outputs.region }}"
domain_filters          = "{{ .nuon.sandbox.outputs.nuon_dns.public_domain.name }}"
internal_domain_filters = "{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
public_zone_name        = "{{ .nuon.sandbox.outputs.cluster.name }}-public"
internal_zone_name      = "{{ .nuon.sandbox.outputs.cluster.name }}-internal"
public_zone_id          = "{{ .nuon.sandbox.outputs.nuon_dns.public_domain.zone_id }}"
internal_zone_id        = "{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.zone_id }}"
service_account_email   = "{{ .nuon.install_stack.outputs.custom_sa_emails.external_dns }}"

cluster_endpoint                   = "{{ .nuon.install.sandbox.outputs.cluster.endpoint }}"
cluster_certificate_authority_data = "{{ .nuon.install.sandbox.outputs.cluster.certificate_authority_data }}"
