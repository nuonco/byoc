operator:
  image:
    repository: "{{ .nuon.components.img_altinity_clickhouse_operator.outputs.image.repository }}"
    tag: "{{ .nuon.components.img_altinity_clickhouse_operator.outputs.image.tag }}"
    pullPolicy: IfNotPresent
  containerSecurityContext: {}
  resources: {}
  env: []

metrics:
  enabled: true
  image:
    repository: "{{ .nuon.components.img_clickhouse_metrics_exporter.outputs.image.repository }}"
    tag: "{{ .nuon.components.img_clickhouse_metrics_exporter.outputs.image.tag }}"
    pullPolicy: IfNotPresent
  containerSecurityContext: {}
  resources: {}
  env: []

config:
  files:
    config.yaml:
      clickhouse:
        access:
          secret:
            namespace: clickhouse
            name: "clickhouse-operator"

imagePullSecrets: []

podLabels:
  "component.nuon.co/name": "clickhouse-operator"
  "component.nuon.co/domain": "storage"
  "component.nuon.co/tier": "core"

podAnnotations:
  prometheus.io/port: '8888'
  prometheus.io/scrape: 'true'
  clickhouse-operator-metrics/port: '9999'
  clickhouse-operator-metrics/scrape: 'true'

serviceAccount:
  create: true
  annotations: {}

rbac:
  create: true

secret:
  create: false

tolerations: []

serviceMonitor:
  enabled: false

dashboards:
  enabled: false
