---
environment: prod

namespace: "dashboard-ui"

image:
  repository: "{{ .nuon.components.img_nuon_dashboard_ui.outputs.image.repository }}"
  tag: "{{ .nuon.components.img_nuon_dashboard_ui.outputs.image.tag }}"

env:
  ENV: prod
  NUON_BYOC: "true"
  METRICS_TAGS: "org_id:{{ .nuon.org.id }},org_name:{{ .nuon.org.name }}"

  NUON_API_URL: "https://api.{{ .nuon.sandbox.outputs.nuon_dns.public_domain.name }}"

  DATADOG_ENV: "byoc-nuon"
  DATADOG_SITE: "us5.datadoghq.com"
  DATADOG_CLIENT_TOKEN: "pubxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  DATADOG_APP_ID: "iiiiiiii-yyyy-xxxx-0000-xxxxxxxxxxxx"

  GITHUB_APP_NAME: "{{ .nuon.inputs.inputs.github_app_name }}"

  NUON_ADMIN_API_URL: "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
  NUON_CTL_API_ADMIN_URL: "http://admin.{{ .nuon.sandbox.outputs.nuon_dns.internal_domain.name }}"
  NUON_TEMPORAL_UI_URL: "http://temporal-web.temporal.svc.cluster.local:8080"
  NUON_ADMIN_DASHBOARD_URL: '{{ ternary "http://ctl-api-dashboard-admin.ctl-api.svc.cluster.local" "" (and (eq "true" .nuon.inputs.inputs.admin_dashboard_enabled) (eq "false" .nuon.inputs.inputs.admin_dashboard_alb_enabled)) }}'

  NUON_AUTH_SERVICE_URL: '{{ ternary (print "https://auth." .nuon.sandbox.outputs.nuon_dns.public_domain.name) "" (or (eq "google" .nuon.inputs.inputs.nuon_auth_provider_type) (eq "oidc" .nuon.inputs.inputs.nuon_auth_provider_type)) }}'
  NUON_APP_URL: "https://app.{{.nuon.sandbox.outputs.nuon_dns.public_domain.name}}"

  SEGMENT_WRITE_KEY: "false"

  HTTP_PORT: "4000"

envSecrets:

ui:
  port: 4000
  liveness_probe: /livez
  readiness_probe: /readyz

  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 1000m
      memory: 1024Mi

  alb:
    public_domain: "app.{{ .nuon.sandbox.outputs.nuon_dns.public_domain.name }}"

  autoscaling:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 50

gcp:
  enabled: true
  certMap: "{{ .nuon.components.certificate_wildcard_public.outputs.cert_map_name }}"

serviceAccount:
  name: dashboard-ui
  annotations:
    iam.gke.io/gcp-service-account: "{{ .nuon.components.dashboard_ui_wi.outputs.service_account_email }}"

nodeSelector:
  pool.nuon.co: ctl-api
tolerations:
  - key: pool.nuon.co
    operator: Equal
    value: ctl-api
    effect: NoSchedule
