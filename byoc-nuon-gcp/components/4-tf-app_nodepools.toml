#:schema https://api.nuon.co/v1/general/config-schema?type=terraform
name              = "app_nodepools"
type              = "terraform_module"
terraform_version = "1.11.3"

[public_repo]
repo      = "nuonco/byoc"
directory = "byoc-nuon-gcp/src/components/app_nodepools"
branch    = "lovable-runtime-sa"

[vars]
install_id             = "{{ .nuon.install.id }}"
project_id             = "{{ .nuon.install_stack.outputs.project_id }}"
cluster_name           = "{{ .nuon.sandbox.outputs.cluster.name }}"
cluster_location       = "{{ .nuon.sandbox.outputs.cluster.location }}"
gke_node_pool_sa_email = "{{ .nuon.install_stack.outputs.gke_node_pool_sa_email }}"
ch_keeper_node_count   = "{{ .nuon.inputs.inputs.ch_keeper_node_count }}"
