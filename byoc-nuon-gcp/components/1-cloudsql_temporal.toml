#:schema https://api.nuon.co/v1/general/config-schema?type=terraform
name              = "cloudsql_temporal"
type              = "terraform_module"
terraform_version = "1.11.3"

drift_schedule = "0 0 * * *"

[public_repo]
repo      = "nuonco/byoc"
directory = "byoc-nuon-gcp/src/components/cloudsql_temporal"
branch    = "main"

[vars]
install_id          = "{{ .nuon.install.id }}"
project_id          = "{{ .nuon.install_stack.outputs.project_id }}"
region              = "{{ .nuon.install_stack.outputs.region }}"
network_self_link   = "{{ .nuon.components.cloudsql_network.outputs.network_self_link }}"
tier                = "{{ .nuon.install.inputs.temporal_db_instance_tier }}"
disk_size           = "500"
deletion_protection = "false"
