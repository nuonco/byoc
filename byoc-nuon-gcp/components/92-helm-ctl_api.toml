# component
name           = "ctl_api"
type           = "helm_chart"
chart_name     = "ctl-api"
namespace      = "ctl-api"
storage_driver = "configmap"
dependencies   = ["cloudsql_nuon", "clickhouse_cluster", "temporal", "management", "ctl_api_init_db", "ctl_api_wi", "certificate_wildcard_public", "external_dns", "app_nodepools"]

[public_repo]
repo      = "nuonco/charts"
directory = "charts/ctl-api"
# TEMP: testing the GCP slack HTTPRoute fix before merge — revert to a tagged
# release (e.g. ctl-api-v0.3.4) once merged.
branch    = "main"

[[values_file]]
contents = "./values/ctl-api.yaml"
