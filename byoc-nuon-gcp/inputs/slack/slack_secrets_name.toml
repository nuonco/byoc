name         = "slack_secrets_name"
description  = "Resource name of the GCP Secret Manager secret (projects/<project>/secrets/<name>) in the central project that holds this install's Slack app credentials. JSON value with keys client_secret and signing_secret. Leave empty to keep Slack disabled."
default      = ""
display_name = "Slack Secrets Name"
required     = false
group        = "slack"

user_configurable = false
