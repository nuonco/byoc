# Restore a ClickHouse backup from S3. Set BACKUP_NAME at invocation.
name    = "clickhouse_restore"
labels  = { service = "clickhouse", type = "break-glass" }
timeout = "30m"

[[triggers]]
type = "manual"

[[steps]]
name            = "run clickhouse-backup restore_remote"
inline_contents = "./ecs/clickhouse_restore/restore.sh"

[steps.env_vars]
CLUSTER     = "{{ .nuon.components.cluster.outputs.cluster_name }}"
TASK_FAMILY = "{{ .nuon.components.clickhouse_backup.outputs.task_family }}"
SUBNETS     = "{{ .nuon.components.cluster.outputs.private_subnet_ids }}"
SG          = "{{ .nuon.components.ecs_clickhouse.outputs.security_group_id }}"
REGION      = "{{ .nuon.install_stack.outputs.region }}"
BACKUP_NAME = ""
