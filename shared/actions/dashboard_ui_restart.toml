# action
# description: restarts dashboard-ui deployments after the dashboard_ui component deploys.
name    = "dashboard_ui_restart"
timeout = "0m30s"

[[triggers]]
type           = "post-deploy-component"
component_name = "dashboard_ui"
index          = 1

[[steps]]
name            = "deployments_restart"
inline_contents = "https://raw.githubusercontent.com/nuonco/actions/refs/heads/main/kube/deployments-restart"

[steps.env_vars]
NAMESPACE = "dashboard-ui"
