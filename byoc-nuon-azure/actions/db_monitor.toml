# action
name = "db_monitor"
timeout = "30s"

[[triggers]]
type = "manual"

[[steps]]
name            = "disk"
inline_contents = "./src/rds/disk_metrics.sh"

[steps.env_vars]
DB_ADDR = "{{ .nuon.components.postgres_temporal.outputs.address }}"
DB_PORT = "{{ .nuon.components.postgres_temporal.outputs.db_instance_port }}"
DB_NAME = "{{ .nuon.components.postgres_temporal.outputs.db_instance_name }}"

[[steps]]
name            = "status"
inline_contents = "./src/rds/instance_status.sh"

[steps.env_vars]
DB_ADDR = "{{ .nuon.components.postgres_temporal.outputs.address }}"
DB_PORT = "{{ .nuon.components.postgres_temporal.outputs.db_instance_port }}"
DB_NAME = "{{ .nuon.components.postgres_temporal.outputs.db_instance_name }}"
