---
image_tag: "1.26.2"
root_domain: nuon.cloud
region: eastus2
rds:
  engine: postgres
  engine_version: "15.8"
  family: "postgres15"
  major_engine_version: "15"
  instance_class: "B_Standard_B2s"
  allocated_storage: "100"
  allocated_storage_alarm_threshold: "10"
  db_name: temporal
  port: 5432
  username: temporal
  multi_az: false
  backup_retention_period: 1
  skip_final_snapshot: true
  deletion_protection: false
  storage_encrypted: true
  enable_replica: false

elasticache:
  enabled: false

elasticsearch:
  enabled: false
