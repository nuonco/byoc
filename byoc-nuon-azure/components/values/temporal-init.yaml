---
image:
  repository: "{{ .nuon.sandbox.outputs.acr.login_server }}/{{ .nuon.components.img_temporal_admin_tools.outputs.image.repository }}"
  tag: "{{ .nuon.components.img_temporal_admin_tools.outputs.image.tag }}"

db:
  host:  "{{ .nuon.components.postgres_temporal.outputs.address }}"
  port: "{{ .nuon.components.postgres_temporal.outputs.db_instance_port }}"
  username: "{{ .nuon.components.postgres_temporal.outputs.db_instance_username }}"

temporal:
  sql:
    plugin: "postgres12"
