#:schema https://api.nuon.co/v1/general/config-schema?type=terraform
name              = "certificate_wildcard_public"
type              = "terraform_module"
terraform_version = "1.11.3"

[public_repo]
repo      = "nuonco/byoc"
directory = "byoc-nuon-azure/src/components/certificate"
branch    = "main"

[vars]
install_id                        = "{{ .nuon.install.id }}"
region                            = "{{ .nuon.install_stack.outputs.region }}"
domain_name                       = "*.{{ .nuon.sandbox.outputs.nuon_dns.public_domain.name }}"
app_gateway_ssl_certificate_name  = "{{ or .nuon.inputs.inputs.public_domain_certificate_name \"\" }}"
